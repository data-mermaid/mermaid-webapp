name: Pull Translations from Lokalise

on:
  schedule:
    # Runs every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  pull-translations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: develop
          fetch-depth: 0

      - name: Pull translations from Lokalise
        id: lokalise-pull
        uses: lokalise/lokalise-pull-action@v5.0.1
        with:
          api_token: ${{ secrets.LOKALISE_API_TOKEN }}
          project_id: ${{ secrets.LOKALISE_PROJECT_ID }}
          translations_path: src/locales
          file_format: json
          base_lang: en
          # Include base-language (English) changes in the pull. The action
          # defaults this to false, which silently drops Lokalise's English
          # source-of-truth edits for existing keys (only target languages sync).
          always_pull_base: true
          skip_include_tags: true
          override_branch_name: chore/lokalise-translations
          # Replace the branch history with a single fresh commit on every run
          # instead of appending. Nobody edits this branch (all corrections are
          # made back in Lokalise), so the PR should mirror Lokalise's current
          # export rather than accumulate weekly commits. Keeps the same PR/thread.
          force_push: true
          override_base_branch: develop
          git_commit_message: "chore(i18n): pull latest translations from Lokalise"
          pr_title: "chore(i18n): pull latest translations from Lokalise"
          pr_body: |
            ${{ github.event_name == 'workflow_dispatch' && 'Manual pull of reviewed translations from' || 'Automated weekly pull of reviewed translations from' }} [Lokalise](https://lokalise.com/).

            **Review checklist:**
            - [ ] Verify translation values look correct
            - [ ] Check for any unexpected changes to `src/locales/en/translation.json`
            - [ ] Confirm text normalization (capitalization, etc.) is consistent
          pr_labels: i18n,automated
          additional_params: >
            {
              "indentation": "2sp",
              "export_empty_as": "skip",
              "export_sort": "a_z",
              "replace_breaks": false,
              "plural_format": "i18next_v4",
              "json_unescaped_slashes": true
            }
