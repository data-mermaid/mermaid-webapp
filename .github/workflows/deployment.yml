name: Deployment

on:
  push:
    branches:
      - develop
    tags:
      - 'v[0-9]+.[0-9]+'        # eg: v1.1
      - 'v[0-9]+.[0-9]+.[0-9]+' # eg: v1.1.1

permissions:
  actions: write
  contents: read
  id-token: write

env:
  CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
  CDK_DEPLOY_ROLE: ${{ secrets.CDK_DEPLOY_ROLE }}
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  deps-cache:
    uses: ./.github/workflows/_deps-cache.yml

  call-lint:
    needs: [deps-cache]
    uses: ./.github/workflows/_lint.yml

  call-test:
    needs: [deps-cache, call-lint]
    uses: ./.github/workflows/_test.yml
    secrets: inherit
    with:
      environment: ${{ (github.ref == 'refs/heads/develop' || github.base_ref == 'develop') && 'dev' || 'production' }}

  call-cdk-deploy:
    concurrency:
      group: app-deployment-${{ github.ref }}
    needs: [call-lint, call-test]
    uses: ./.github/workflows/_cdk.yml
    secrets: inherit
    with:
      cdk_subcommand: deploy
      environment: ${{ (github.ref == 'refs/heads/develop' || github.base_ref == 'develop') && 'dev' || 'production' }}
